<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}SPK KOL Instagram{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand d-inline-flex align-items-center gap-2" href="/">
      <span class="brand-logo" aria-hidden="true">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="3"  y="13" width="4" height="8" rx="1.2" fill="currentColor" opacity=".55"/>
          <rect x="10" y="8"  width="4" height="13" rx="1.2" fill="currentColor" opacity=".8"/>
          <rect x="17" y="3"  width="4" height="18" rx="1.2" fill="currentColor"/>
        </svg>
      </span>
      <span class="brand-text">
        <span class="brand-name">SPK KOL</span>
        <span class="brand-sub">Instagram &middot; F&amp;B Bali</span>
      </span>
    </a>
    <button class="navbar-toggler border-0 p-1" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link {% if request.url.path == '/' %}active{% endif %}" href="/">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link {% if request.url.path == '/kol' %}active{% endif %}" href="/kol">Daftar KOL</a></li>
        <li class="nav-item"><a class="nav-link {% if request.url.path == '/cari' %}active{% endif %}" href="/cari">Cari KOL</a></li>
        <li class="nav-item"><a class="nav-link {% if request.url.path.startswith('/riwayat') %}active{% endif %}" href="/riwayat">Riwayat</a></li>
      </ul>
    </div>
  </div>
</nav>
<div class="container py-4">
{% block content %}{% endblock %}
</div>
<footer class="text-center text-muted py-4 mt-4">
  SPK Pemilihan KOL Instagram &middot; UMKM F&amp;B Bali &middot; Weighted Sum Model
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
